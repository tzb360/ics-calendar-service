name: Build Holidays ICS
# 中国法定节假日 - 每天检查一次 (北京时间 08:00)

on:
  schedule:
    # 每天北京时间 08:00 (UTC 00:00)
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    paths:
      - "src/holidays_fetcher.py"
      - "src/ics_generator.py"
      - "main.py"
      - "requirements.txt"
      - ".github/workflows/holidays.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Build Holidays ICS
        run: python main.py holidays

      - name: Check for changes
        id: git-check
        run: |
          if git diff --quiet output/holidays.ics; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will commit."
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/holidays.ics
          git commit -m "🔄 Update holidays.ics [auto]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          force_orphan: false
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: "🔄 Update ICS files [auto]"
